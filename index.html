<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite National Hospital System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>
/* CSS Variables for easy theme switching */
:root {
    --bg-color: #f4f6f9;
    --card-bg: #ffffff;
    --text-color: #333;
    --sidebar-bg: #2c3e50;
    --sidebar-hover: #34495e;
    --table-border: #eee;
}

[data-theme="dark"] {
    --bg-color: #1a1a1a;
    --card-bg: #2d2d2d;
    --text-color: #f4f4f4;
    --sidebar-bg: #111;
    --sidebar-hover: #222;
    --table-border: #444;
}

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin:0;
    background: var(--bg-color);
    color: var(--text-color);
    display:flex;
    transition: background 0.3s ease;
}

.sidebar{
    width:250px;
    background: var(--sidebar-bg);
    color:white;
    height:100vh;
    position:fixed;
    transition: background 0.3s ease;
}

.sidebar h2{
    padding:25px;
    font-size:24px;
}

.sidebar ul { padding: 0; }

.sidebar li{
    list-style:none;
    padding:15px 25px;
    cursor:pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Sidebar Hover Animation */
.sidebar li:hover{
    background: var(--sidebar-hover);
    padding-left: 35px; /* Slight slide effect */
    color: #3498db;
}

.theme-toggle {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    margin: 0 25px 20px 25px;
    width: calc(100% - 50px);
    padding: 10px;
}

.main{
    margin-left:250px;
    padding:40px;
    width:100%;
}

.section{display:none}
.section.active{display:block}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}
.card{
    background: var(--card-bg);
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
    opacity:0;
    transform:translateY(20px);
    animation:fadeInCard 0.6s forwards;
    transition: background 0.3s ease;
}
@keyframes fadeInCard{
    to{opacity:1; transform:translateY(0);}
}

/* Gallery */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
.gallery img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:.4s;
}
.gallery img:hover{
    transform:scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Tables */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background: var(--card-bg);
}
th,td{
    padding:12px;
    border-bottom:1px solid var(--table-border);
}

/* Heart Monitor Background adjustment */
.monitor-container {
    text-align:center; 
    margin-top:50px; 
    position:relative; 
    background: #000; 
    padding: 20px; 
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
}

#floatingHeart{
    position:absolute;
    bottom:20px;
    right:20px;
    width:60px;
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

input{
    padding:8px;
    margin:5px 5px 15px 0;
    border-radius:5px;
    border:1px solid #ccc;
    background: var(--card-bg);
    color: var(--text-color);
}
button{
    cursor:pointer;
    background:#0056b3;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
}
</style>
</head>
<body>

<nav class="sidebar">
<h2>🏥 HMS</h2>
<button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i> Dark Mode
</button>
<ul>
<li onclick="show('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</li>
<li onclick="show('patients')"><i class="fas fa-user-injured"></i> Patients</li>
<li onclick="show('doctors')"><i class="fas fa-user-md"></i> Doctors</li>
<li onclick="show('pharmacy')"><i class="fas fa-pills"></i> Pharmacy</li>
</ul>
</nav>

<div class="main">

<div id="dashboard" class="section active">
    <div class="cards">
        <div class="card">
            <h1>🤒</h1>
            <h2 id="pCount">0</h2>
            Patients
        </div>
        <div class="card">
            <h1>👨‍⚕️</h1>
            <h2 id="dCount">0</h2>
            Doctors
        </div>
        <div class="card">
            <h1>💊</h1>
            <h2 id="mCount">0</h2>
            Medicines
        </div>
    </div>

    <h2>Hospital Gallery</h2>
    <div class="gallery">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1559839734-2b71f1e3c770?auto=format&fit=crop&w=500&q=80">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1631815541552-b9f0827e3ccc?auto=format&fit=crop&w=500&q=80">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1537368910025-700350fe46c7?auto=format&fit=crop&w=500&q=80">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1581056771107-24ca5f033842?auto=format&fit=crop&w=500&q=80">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=500&q=80">
        <img data-aos="zoom-in" src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?auto=format&fit=crop&w=500&q=80">
    </div>

    <div class="monitor-container">
        <h3 style="color: #00ff00;">Patient Heart Monitor</h3>
        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidmZ3ZzR2bmpscmI0ZTVqZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif" width="300">
        <img id="floatingHeart" src="https://cdn-icons-png.flaticon.com/512/822/822118.png">
    </div>
</div>

<div id="patients" class="section">
    <h2>Add Patient</h2>
    <input id="pName" placeholder="Name">
    <input id="pAge" placeholder="Age">
    <button onclick="addPatient()">Add</button>
    <table>
    <thead><tr><th>ID</th><th>Name</th><th>Age</th></tr></thead>
    <tbody id="patientTable"></tbody>
    </table>
</div>

<div id="doctors" class="section">
    <h2>Add Doctor</h2>
    <input id="dName" placeholder="Doctor Name">
    <input id="dSpec" placeholder="Specialization">
    <input type="file" id="dImg">
    <button onclick="addDoctor()">Add</button>
    <table>
    <thead><tr><th>Photo</th><th>Name</th><th>Specialization</th></tr></thead>
    <tbody id="doctorTable"></tbody>
    </table>
</div>

<div id="pharmacy" class="section">
    <h2>Add Medicine</h2>
    <input id="mName" placeholder="Medicine">
    <input id="mQty" type="number" placeholder="Stock">
    <button onclick="addMed()">Add</button>
    <table>
    <thead><tr><th>Medicine</th><th>Stock</th><th>Status</th></tr></thead>
    <tbody id="medTable"></tbody>
    </table>
</div>

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration:800});

let db={patients:[],doctors:[],meds:[]}

function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    const btn = document.querySelector('.theme-toggle');
    btn.innerHTML = isDark ? '<i class="fas fa-moon"></i> Dark Mode' : '<i class="fas fa-sun"></i> Light Mode';
}

function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    document.getElementById(id).classList.add("active")
}

// Logic for adding patients, doctors, etc. remains same...
function addPatient(){
    if(pName.value && pAge.value){
        db.patients.push({id:"P"+Math.floor(Math.random()*9000),name:pName.value,age:pAge.value})
        render()
        pName.value=""; pAge.value="";
    }
}
function addDoctor(){
    let file=dImg.files[0], url="https://via.placeholder.com/40";
    if(file){url=URL.createObjectURL(file)}
    if(dName.value && dSpec.value){
        db.doctors.push({name:dName.value,spec:dSpec.value,img:url})
        render()
        dName.value=""; dSpec.value=""; dImg.value="";
    }
}
function addMed(){
    if(mName.value && mQty.value){
        db.meds.push({name:mName.value,qty:parseInt(mQty.value)})
        render()
        mName.value=""; mQty.value="";
    }
}
function render(){
    patientTable.innerHTML=db.patients.map(p=>`<tr><td>${p.id}</td><td>${p.name}</td><td>${p.age}</td></tr>`).join("")
    doctorTable.innerHTML=db.doctors.map(d=>`<tr><td><img src="${d.img}" width="40" height="40" style="border-radius:50%; object-fit:cover;"></td><td>${d.name}</td><td>${d.spec}</td></tr>`).join("")
    medTable.innerHTML=db.meds.map(m=>{
        let status=m.qty<10?"LOW":"GOOD",cls=m.qty<10?"low":"good";
        return `<tr><td>${m.name}</td><td>${m.qty}</td><td class="${cls}">${status}</td></tr>`
    }).join("")
    pCount.innerText=db.patients.length
    dCount.innerText=db.doctors.length
    mCount.innerText=db.meds.length
}
</script>

</body>
</html>
