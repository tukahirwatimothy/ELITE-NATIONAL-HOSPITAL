<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite National Hospital System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
<style>
/* Your existing styles remain unchanged */
body{font-family:Segoe UI;margin:0;background:#f4f6f9;display:flex;}
.sidebar{width:250px;background:#2c3e50;color:white;height:100vh;position:fixed;}
.sidebar h2{padding:25px;font-size:24px;}
.sidebar li{list-style:none;padding:15px 25px;cursor:pointer;transition:0.3s;}
.sidebar li:hover{background:#34495e;}
.main{margin-left:250px;padding:40px;width:100%;}
.section{display:none}.section.active{display:block;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}
.card{background:white;padding:30px;border-radius:10px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,.05);opacity:0;transform:translateY(20px);animation:fadeInCard 0.6s forwards;}
@keyframes fadeInCard{to{opacity:1;transform:translateY(0);}}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.gallery img{width:100%;height:150px;object-fit:cover;border-radius:8px;cursor:pointer;transition:.4s;}
.gallery img:hover{transform:scale(1.08);}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{padding:12px;border-bottom:1px solid #eee;}
.low{color:red}.medium{color:orange}.high{color:darkorange}.good{color:green;}
#notifBar{background:#0056b3;color:white;padding:8px 15px;border-radius:6px;margin-bottom:15px;overflow:hidden;position:relative;}
#notifBar span{display:inline-block;white-space:nowrap;animation:scrollNotif 15s linear infinite;}
@keyframes scrollNotif{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
#cartoon{position:absolute;bottom:10px;right:10px;width:120px;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(3deg);}}
input,button{padding:8px;margin:5px 5px 15px 0;border-radius:5px;border:1px solid #ccc;}
button{cursor:pointer;background:#0056b3;color:white;border:none;}
.emoji-live{font-size:2rem;display:inline-block;animation:jump 1s infinite;}
@keyframes jump{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
</style>
</head>
<body>
<nav class="sidebar">
<h2>🏥 HMS</h2>
<ul>
<li onclick="show('dashboard')">Dashboard</li>
<li onclick="show('patients')">Patients</li>
<li onclick="show('registration')">Registration</li>
<li onclick="show('doctors')">Doctors</li>
<li onclick="show('pharmacy')">Pharmacy</li>
<li onclick="logout()">Logout</li>
</ul>
</nav>
<div class="main">
<!-- LOGIN (unchanged) -->
<div id="login" class="section active">
<h2>🏥 HMS Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div id="notifBar"><span>⚠️ Low stock: Paracetamol | ⚠️ Moderate: Ibuprofen | ✅ Good: Aspirin</span></div>
<div class="cards">
<div class="card">
<h1 class="emoji-live" id="patientEmoji">🤒</h1>
<h2 id="pCount">0</h2>
Patients
</div>
<div class="card">
<h1 class="emoji-live" id="doctorEmoji">👨🏿‍⚕️</h1>
<h2 id="dCount">0</h2>
Doctors
</div>
<div class="card">
<h1 class="emoji-live" id="medEmoji">💊</h1>
<h2 id="mCount">0</h2>
Medicines
</div>
</div>

<h2>Hospital Gallery</h2>
<div class="gallery" id="gallery">
  <!-- Reliable images of Black doctors with Black patients / healthcare settings -->
  <img data-aos="zoom-in" src="https://c8.alamy.com/comp/2G3JPJC/portrait-of-smiling-joyful-african-lady-doctor-performing-manual-palpation-examining-stomach-abdomen-of-little-boy-and-talking-to-him-where-it-hurts-belly-pain-concept-2G3JPJC.jpg" alt="Black female doctor examining child patient">
  <img data-aos="zoom-in" src="https://img.freepik.com/premium-photo/doctor-consulting-with-patient-both-smiling_1132842-16463.jpg" alt="Black male doctor smiling with patient">
  <img data-aos="zoom-in" src="https://www.csoonline.com/wp-content/uploads/2025/04/564832-0-19867300-1745835789-shutterstock_2276001457.jpg" alt="Black doctor consulting elderly patient">
  <img data-aos="zoom-in" src="https://i0.wp.com/post.healthline.com/wp-content/uploads/2021/11/Nurse-taking-black-woman-blood-pressure-header.jpg" alt="Nurse taking blood pressure of Black patient">
  <img data-aos="zoom-in" src="https://pcna.net/wp-content/uploads/2024/02/Black-patient-black-doctor-women-woman-stethoscope-1024x683.jpg" alt="Black doctor using stethoscope on Black female patient">
</div>

<div style="text-align:center;margin-top:30px;position:relative;">
<h3>Patient Heart Monitor</h3>
<!-- New heartbeat animation (EKG pulse style) -->
<img src="https://media.istockphoto.com/id/1328668136/video/heartbeat-line-heart-pulse-ecg-beat-rhytm-graph-animation-cardio-animated-video.jpg?s=640x640&k=20&c=t7fYMeSS-0EqmzO9ePni0vD8ft7LOP5Eck3cIMAiDKw=" width="300" alt="Heartbeat monitor animation">
<!-- New hospital cartoon animation -->
<img id="cartoon" src="https://i.pinimg.com/originals/51/d7/e7/51d7e77c36a68ee327dcb68337222b1e.gif" alt="Animated doctor checking patient">
</div>
</div>

<!-- PATIENTS, REGISTRATION, DOCTORS, PHARMACY sections remain unchanged -->
<!-- ... your original code for these sections ... -->

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
// Your existing JavaScript remains unchanged
AOS.init({duration:800});
function show(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
// ... rest of your script (login, fetchAll, addPatient, etc.) ...
</script>
</body>
</html>
