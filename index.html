<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite National Hospital System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>

:root{
--primary:#0056b3;
--dark:#2c3e50;
--bg:#f4f6f9;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:var(--bg);
display:flex;
min-height:100vh;
}

/* LOGIN */

#loginPage{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#1a252f,#0056b3);
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.btn{
padding:10px 20px;
border:none;
background:var(--primary);
color:white;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#003e85;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:var(--dark);
color:white;
height:100vh;
position:fixed;
}

.sidebar h2{
padding:25px;
font-size:1.2rem;
}

.sidebar li{
list-style:none;
padding:15px 25px;
cursor:pointer;
border-left:4px solid transparent;
}

.sidebar li:hover,
.sidebar li.active{
background:#34495e;
border-left:4px solid var(--primary);
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:calc(100% - 250px);
}

.section{display:none}
.section.active{display:block}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-bottom:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.card i{
font-size:2rem;
color:var(--primary);
margin-bottom:10px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:3000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
}

.modal-content{
display:block;
margin:5% auto;
max-width:700px;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

/* LOW STOCK */

.low{
color:#c0392b;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>Elite National HMS</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button class="btn" style="width:100%" onclick="login()">Sign In</button>

<p style="font-size:12px;margin-top:10px">admin / 1234</p>

</div>

</div>

<!-- SIDEBAR -->

<nav class="sidebar">

<h2><i class="fas fa-hospital"></i> HMS</h2>

<ul>

<li class="active" onclick="showSection('dashboard',this)">Dashboard</li>
<li onclick="showSection('patients',this)">Patients</li>
<li onclick="showSection('doctors',this)">Doctors</li>
<li onclick="showSection('pharmacy',this)">Pharmacy</li>

</ul>

</nav>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card" data-aos="fade-up">
<i class="fas fa-users"></i>
<h3 id="pCount">0</h3>
Patients
</div>

<div class="card" data-aos="fade-up">
<i class="fas fa-user-md"></i>
<h3 id="dCount">0</h3>
Doctors
</div>

<div class="card" data-aos="fade-up">
<i class="fas fa-pills"></i>
<h3 id="mCount">0</h3>
Medicines
</div>

</div>

<h2>Hospital Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1581056771107-24ca5f033842" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1551076805-e1869033e561" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1516549655169-df83a0774514" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1580281657527-47a7d4d1b55f" onclick="openImage(this)">

</div>

</div>

<!-- PATIENTS -->

<div id="patients" class="section">

<h2>Patient Registry</h2>

<input id="pName" placeholder="Name">
<input id="pAge" type="number" placeholder="Age">

<button class="btn" onclick="addPatient()">Add</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
</tr>
</thead>

<tbody id="patientTable"></tbody>

</table>

</div>

<!-- DOCTORS -->

<div id="doctors" class="section">

<h2>Add Doctor</h2>

<input id="dName" placeholder="Doctor Name">
<input id="dSpec" placeholder="Specialization">

<button class="btn" onclick="addDoctor()">Add</button>

<table>

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Specialization</th>
</tr>
</thead>

<tbody id="doctorTable"></tbody>

</table>

</div>

<!-- PHARMACY -->

<div id="pharmacy" class="section">

<h2>Add Medicine</h2>

<input id="mName" placeholder="Medicine">
<input id="mQty" type="number" placeholder="Stock">

<button class="btn" onclick="addMed()">Add</button>

<table>

<thead>
<tr>
<th>Medicine</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="medTable"></tbody>

</table>

</div>

</div>

<!-- IMAGE MODAL -->

<div id="imgModal" class="modal">

<span class="close" onclick="closeImage()">&times;</span>

<img class="modal-content" id="modalImg">

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

/* DATABASE */

let db={
patients:[],
doctors:[],
meds:[]
}

/* LOGIN */

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none"
render()
}else alert("Wrong login")

}

/* NAVIGATION */

function showSection(id,el){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".sidebar li").forEach(l=>l.classList.remove("active"))

document.getElementById(id).classList.add("active")
el.classList.add("active")

}

/* PATIENT */

function addPatient(){

let name=pName.value
let age=pAge.value

db.patients.push({
id:"P"+Math.floor(Math.random()*9000),
name,
age
})

render()

}

/* DOCTOR */

function addDoctor(){

db.doctors.push({
name:dName.value,
spec:dSpec.value,
img:"https://i.pravatar.cc/100?u="+Math.random()
})

render()

}

/* MEDICINE */

function addMed(){

db.meds.push({
name:mName.value,
qty:mQty.value
})

render()

}

/* RENDER */

function render(){

patientTable.innerHTML=db.patients.map(p=>
`<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.age}</td>
</tr>`
).join("")

doctorTable.innerHTML=db.doctors.map(d=>
`<tr>
<td><img src="${d.img}" width="40" style="border-radius:50%"></td>
<td>${d.name}</td>
<td>${d.spec}</td>
</tr>`
).join("")

medTable.innerHTML=db.meds.map(m=>
`<tr>
<td>${m.name}</td>
<td class="${m.qty<10?'low':''}">${m.qty}</td>
</tr>`
).join("")

pCount.innerText=db.patients.length
dCount.innerText=db.doctors.length
mCount.innerText=db.meds.length

}

/* IMAGE MODAL */

function openImage(img){

modalImg.src=img.src
imgModal.style.display="block"

}

function closeImage(){

imgModal.style.display="none"

}

</script>

</body>
</html>
